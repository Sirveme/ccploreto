<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Importar CSV · Secretaría · CCPL</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0f1117;
        --bg-elevated: #181a20;
        --surface: #1e2028;
        --border: rgba(255,255,255,0.08);
        --text: #e8e8ed;
        --text-sec: #8b8d97;
        --text-dim: #5a5d68;
        --accent: #6366f1;
        --green: #22c55e;
        --red: #ef4444;
        --amber: #f59e0b;
        --blue: #3b82f6;
        --mono: 'JetBrains Mono', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 20px;
    }
    .wrap { max-width: 1400px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .subtitle { color: var(--text-sec); font-size: 13px; margin-bottom: 18px; }
    .back-link {
        display: inline-block; color: var(--text-sec); text-decoration: none;
        font-size: 13px; margin-bottom: 12px;
    }
    .back-link:hover { color: var(--accent); }

    .panel {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px;
        margin-bottom: 16px;
    }

    .upload-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .upload-row input[type=file] {
        flex: 1; min-width: 240px; padding: 10px;
        background: var(--surface); color: var(--text);
        border: 1px dashed rgba(99,102,241,0.4); border-radius: 8px;
        font-family: inherit;
    }
    .btn {
        padding: 10px 18px; border: none; border-radius: 8px;
        font-family: inherit; font-weight: 600; font-size: 13px;
        cursor: pointer; transition: all 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #4f51d1; }
    .btn-exec {
        background: linear-gradient(135deg, #16a34a, #15803d);
        color: #fff;
    }
    .btn-exec:hover:not(:disabled) { opacity: 0.92; }
    .btn-ghost {
        background: transparent; color: var(--text-sec);
        border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--text-dim); }

    /* Resumen */
    .resumen-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .chip {
        padding: 4px 10px; border-radius: 999px; font-size: 12px;
        background: rgba(99,102,241,0.14); color: var(--accent);
        border: 1px solid rgba(99,102,241,0.3);
    }
    .chip .n { font-weight: 700; margin-right: 4px; }

    /* Tabla */
    .tabla-wrap {
        overflow: auto; border: 1px solid var(--border); border-radius: 10px;
        max-height: 70vh;
    }
    table.ops { width: 100%; border-collapse: collapse; font-size: 13px; }
    .ops thead th {
        position: sticky; top: 0; z-index: 2;
        background: #222530; color: var(--text-sec);
        text-align: left; padding: 10px; font-weight: 600;
        border-bottom: 1px solid var(--border);
    }
    .ops tbody td {
        padding: 9px 10px; border-bottom: 1px solid var(--border);
        vertical-align: top;
    }
    .ops tbody tr:hover { background: rgba(99,102,241,0.04); }
    .ops tbody tr.disabled td { opacity: 0.5; }
    .ops tbody tr.not-found td:nth-child(4) { color: var(--red); }
    .ops input[type=checkbox] { accent-color: var(--accent); transform: scale(1.1); }

    .badge {
        display: inline-block; padding: 2px 8px; border-radius: 10px;
        font-size: 11px; font-weight: 600; white-space: nowrap;
        border: 1px solid;
    }
    .desc-cell { max-width: 260px; color: var(--text-sec); font-size: 12px; }
    .monto-cell { font-family: var(--mono); white-space: nowrap; }
    .msg-cell { font-size: 12px; }
    .estado-ok { color: var(--green); font-weight: 600; }
    .estado-err { color: var(--red); }
    .estado-manual { color: var(--amber); }
    .estado-omit { color: var(--text-dim); }

    /* Toast */
    #toast-root { position: fixed; right: 20px; bottom: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-left: 4px solid var(--accent);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        min-width: 240px;
    }
    .toast.ok { border-left-color: var(--green); }
    .toast.err { border-left-color: var(--red); }

    .spinner {
        display: inline-block; width: 12px; height: 12px;
        border: 2px solid rgba(255,255,255,0.2);
        border-top-color: currentColor;
        border-radius: 50%;
        animation: sp 0.8s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
    }
    @keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
    <a class="back-link" href="/secretaria">← Volver a Secretaría</a>
    <h1>📥 Importar correcciones CSV</h1>
    <p class="subtitle">Sube el archivo de correcciones masivas. Se mostrará un preview de cada operación antes de ejecutar.</p>

    <div class="panel">
        <div class="upload-row">
            <input type="file" id="csvFile" accept=".csv,text/csv">
            <button class="btn btn-primary" id="btnParsear" onclick="parsearCSV()">Analizar CSV</button>
        </div>
    </div>

    <div class="panel" id="panelPreview" style="display:none;">
        <div class="resumen-chips" id="resumenChips"></div>

        <div class="tabla-wrap">
            <table class="ops">
                <thead>
                    <tr>
                        <th style="width:34px;"><input type="checkbox" id="checkAll" onclick="toggleTodos(this)"></th>
                        <th>Fila</th>
                        <th>Código</th>
                        <th>Colegiado</th>
                        <th>Operación</th>
                        <th>Detalle</th>
                        <th>Monto</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tbodyOps"></tbody>
            </table>
        </div>

        <div style="margin-top: 14px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
            <button class="btn btn-exec" id="btnEjecutar" onclick="ejecutarSeleccionados()">▶ Ejecutar seleccionados</button>
            <span id="contadorSel" class="chip"><span class="n" id="selN">0</span> seleccionada(s)</span>
            <button class="btn btn-ghost" onclick="resetImport()" type="button">Reset</button>
        </div>
    </div>
</div>

<div id="toast-root"></div>

<script>
(() => {
    let _ops = [];

    const tipoBadge = {
        agregar_fraccionamiento: { lbl: '🔢 Fraccionamiento', c: '#2563eb' },
        agregar_deuda:           { lbl: '➕ Agregar deuda',    c: '#16a34a' },
        modificar_monto:         { lbl: '✏️ Modif. monto',     c: '#d97706' },
        quitar_concepto:         { lbl: '🗑 Quitar concepto',  c: '#64748b' },
        modificar_concepto:      { lbl: '🔁 Modif. concepto',  c: '#9333ea' },
        cambiar_estado:          { lbl: '🔄 Estado',           c: '#0891b2' },
        revertir_pago:           { lbl: '↩ Revertir pago',    c: '#64748b' },
        no_soportado:            { lbl: '⚠ No soportado',     c: '#ef4444' },
    };

    const NO_EJECUTABLES = ['quitar_concepto','modificar_concepto','revertir_pago','no_soportado'];

    function toast(msg, tipo='ok') {
        const root = document.getElementById('toast-root');
        const el = document.createElement('div');
        el.className = 'toast ' + tipo;
        el.textContent = msg;
        root.appendChild(el);
        setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(10px)'; }, 3500);
        setTimeout(() => el.remove(), 4000);
    }

    function escHtml(s) {
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function parsearCSV() {
        const file = document.getElementById('csvFile').files[0];
        if (!file) { toast('Selecciona un archivo CSV', 'err'); return; }

        const btn = document.getElementById('btnParsear');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Analizando...';

        try {
            const fd = new FormData();
            fd.append('file', file);
            const r = await fetch('/api/secretaria/importar/parsear', { method: 'POST', body: fd });
            const data = await r.json();
            if (!data.ok) { toast(data.error || 'Error al parsear', 'err'); return; }
            _ops = data.operaciones;
            render();
            document.getElementById('panelPreview').style.display = 'block';
            toast(`${data.total} operaciones detectadas`, 'ok');
        } catch (e) {
            toast('Error de conexión: ' + e.message, 'err');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Analizar CSV';
        }
    }

    function render() {
        // Resumen de tipos
        const counts = {};
        _ops.forEach(op => { counts[op.tipo] = (counts[op.tipo] || 0) + 1; });
        const chips = document.getElementById('resumenChips');
        chips.innerHTML = Object.entries(counts).map(([t, n]) => {
            const b = tipoBadge[t] || { lbl: t, c: '#666' };
            return `<span class="chip" style="background:${b.c}22;color:${b.c};border-color:${b.c}55">
                      <span class="n">${n}</span> ${escHtml(b.lbl)}
                    </span>`;
        }).join('');
        chips.insertAdjacentHTML('afterbegin',
            `<span class="chip"><span class="n">${_ops.length}</span> Total</span>`);

        const tbody = document.getElementById('tbodyOps');
        tbody.innerHTML = _ops.map((op, idx) => {
            const noEjec = NO_EJECUTABLES.includes(op.tipo);
            const noFound = !op.colegiado_encontrado;
            const deshab = noEjec || noFound;
            const b = tipoBadge[op.tipo] || { lbl: op.tipo, c: '#666' };
            let estadoHtml = '';
            if (op.estado === 'ok') {
                estadoHtml = `<span class="estado-ok">✓ ${escHtml(op.mensaje || 'OK')}</span>`;
            } else if (op.estado === 'error') {
                estadoHtml = `<span class="estado-err">✗ ${escHtml(op.mensaje || 'Error')}</span>`;
            } else if (op.estado === 'omitido') {
                estadoHtml = `<span class="estado-omit">—</span>`;
            } else if (noEjec) {
                estadoHtml = `<span class="estado-manual">Manual</span>`;
            } else if (noFound) {
                estadoHtml = `<span class="estado-err">Colegiado no encontrado</span>`;
            } else {
                estadoHtml = `<span class="estado-omit">Pendiente</span>`;
            }

            const monto = op.monto != null
                ? `S/ ${Number(op.monto).toFixed(2)}`
                : (op.monto_raw ? escHtml(op.monto_raw) : '—');

            return `
            <tr class="${deshab ? 'disabled' : ''} ${noFound ? 'not-found' : ''}" data-idx="${idx}">
              <td>
                <input type="checkbox" class="chkOp" data-idx="${idx}"
                       ${deshab ? 'disabled' : 'checked'}
                       onchange="window.__importer.updateCounter()">
              </td>
              <td>${op.fila}</td>
              <td><strong>${escHtml(op.codigo || '—')}</strong></td>
              <td>${op.colegiado_nombre ? escHtml(op.colegiado_nombre) : '<em>No encontrado</em>'}</td>
              <td><span class="badge" style="background:${b.c}22;color:${b.c};border-color:${b.c}55;">${escHtml(b.lbl)}</span></td>
              <td class="desc-cell">${escHtml(op.descripcion || '—')}</td>
              <td class="monto-cell">${monto}</td>
              <td class="msg-cell">${estadoHtml}</td>
            </tr>`;
        }).join('');

        updateCounter();
    }

    function updateCounter() {
        const n = document.querySelectorAll('.chkOp:checked').length;
        document.getElementById('selN').textContent = n;
    }

    function toggleTodos(master) {
        document.querySelectorAll('.chkOp:not(:disabled)').forEach(chk => {
            chk.checked = master.checked;
        });
        updateCounter();
    }

    async function ejecutarSeleccionados() {
        const seleccionados = [];
        document.querySelectorAll('.chkOp').forEach(chk => {
            const idx = parseInt(chk.dataset.idx);
            seleccionados.push({ ..._ops[idx], ejecutar: chk.checked && !chk.disabled });
        });
        const n = seleccionados.filter(o => o.ejecutar).length;
        if (n === 0) { toast('No hay operaciones seleccionadas', 'err'); return; }

        const btn = document.getElementById('btnEjecutar');
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span>Ejecutando ${n} operaciones...`;

        try {
            const r = await fetch('/api/secretaria/importar/ejecutar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ operaciones: seleccionados }),
            });
            const data = await r.json();
            if (!data.ok) { toast(data.error || 'Error al ejecutar', 'err'); return; }
            _ops = data.resultados;
            render();
            const { ok, error, omitido } = data.resumen;
            toast(`Completado: ${ok} OK · ${error} errores · ${omitido} omitidas`,
                  error > 0 ? 'err' : 'ok');
        } catch (e) {
            toast('Error de conexión: ' + e.message, 'err');
        } finally {
            btn.disabled = false;
            btn.textContent = '▶ Ejecutar seleccionados';
        }
    }

    function resetImport() {
        _ops = [];
        document.getElementById('panelPreview').style.display = 'none';
        document.getElementById('csvFile').value = '';
        document.getElementById('tbodyOps').innerHTML = '';
        document.getElementById('resumenChips').innerHTML = '';
        document.getElementById('checkAll').checked = false;
        updateCounter();
    }

    // Exponer funciones llamadas desde onclick inline
    window.parsearCSV = parsearCSV;
    window.toggleTodos = toggleTodos;
    window.ejecutarSeleccionados = ejecutarSeleccionados;
    window.resetImport = resetImport;
    window.__importer = { updateCounter };
})();
</script>
</body>
</html>
