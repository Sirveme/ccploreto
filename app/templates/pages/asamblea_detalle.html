<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>Asamblea — CCPL</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         background:#0b1220;color:#e2e8f0;min-height:100vh;}
    .wrap{max-width:560px;margin:0 auto;padding:40px 20px;text-align:center;}
    .wrap h1{color:#fbbf24;font-size:22px;}
    .wrap p{color:#94a3b8;font-size:14px;line-height:1.6;}
    .volver{display:inline-block;margin-top:24px;color:#60a5fa;text-decoration:none;font-size:14px;}
  </style>
</head>
<body>
  <div class="wrap">
    <div style="font-size:56px;">🏛️</div>
    <h1>Asamblea del Colegio</h1>
    <p>Cargando los detalles de la asamblea…<br>
       Si no ves la ventana, toca el botón de abajo.</p>
    <button id="abrir-asamblea" style="margin-top:16px;background:linear-gradient(135deg,#f59e0b,#d97706);
            color:#1a1205;border:none;border-radius:10px;padding:12px 22px;font-weight:700;
            font-size:15px;cursor:pointer;">Ver asamblea</button>
    <br>
    <a class="volver" href="/dashboard">← Volver al inicio</a>
  </div>

  {% include "partials/modal_asamblea.html" %}

  <script>
    (function(){
      const BID = {{ bulletin_id|int }};
      const QR_TOKEN = "{{ qr_token }}";
      function abrir(){ if (window.mostrarModalAsamblea) window.mostrarModalAsamblea(BID); }
      document.getElementById('abrir-asamblea')?.addEventListener('click', abrir);
      window.addEventListener('load', async function(){
        // Si llega desde el QR físico, intentamos marcar asistencia primero.
        if (QR_TOKEN && window.marcarAsistenciaQRAsamblea) {
          await window.marcarAsistenciaQRAsamblea(BID, QR_TOKEN);
        }
        setTimeout(abrir, 400);
      });
    })();
  </script>
</body>
</html>
